<!DOCTYPE html>
<html lang="en">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#2d6a4f;--accent-light:rgba(45,106,79,0.1);--good:#2d6a4f;--again:#c1292e;--text:#1a1a1a;--text-muted:#777;--card:#fafaf8;--surface:#fff;--border:#e5e5e0;--heat0:#ebedf0;--heat1:#c6e48b;--heat2:#7bc96f;--heat3:#239a3b;--heat4:#196127;--leech:#e76f51;--conf-low:#e76f51;--conf-mid:#e09f3e;--conf-high:#2d6a4f}
@media(prefers-color-scheme:dark){:root{--text:#e8e8e8;--text-muted:#999;--card:#1e1e1e;--surface:#141414;--border:#2a2a2a;--heat0:#161b22;--heat1:#0e4429;--heat2:#006d32;--heat3:#26a641;--heat4:#39d353}}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh}
textarea,input{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;
const F="'DM Sans',sans-serif",S="'DM Serif Display',Georgia,serif";
const sec={marginBottom:28,padding:"20px 22px",borderRadius:14,background:"var(--card)",border:"1px solid var(--border)"};
const secT={fontFamily:S,fontSize:16,fontWeight:700,color:"var(--text)",margin:"0 0 14px"};
const lab={fontSize:11,color:"var(--text-muted)",fontFamily:F,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.06em"};

/* ═══ SEEDS ═══ */
const SEEDS=[
{d:"OOO",f:"A geologist studies rocks. A sociologist studies how people talk about rocks. What would an object-oriented ontologist say both approaches miss?",b:"Both make rocks dependent on human access. OOO holds that the rock has its own reality that withdraws from any relation. The rock is not exhausted by what it means to us."},
{d:"OOO",f:"OOO rejects \"correlationism.\" Using an everyday example, explain what it is and why OOO finds it problematic.",b:"Correlationism says we can only access the correlation between thought and world. Example: \"Does a tree falling make a sound if no one hears it?\" A correlationist says we can't meaningfully answer. OOO says yes — the tree has real qualities independent of any observer."},
{d:"OOO",f:"A human, a plastic bottle, a quarantine law, and a neutron star. How does OOO treat these differently from traditional philosophy?",b:"It doesn't — that's the point. Flat ontology grants all objects equal ontological status. Traditional philosophy privileges humans as foundation. OOO flattens this hierarchy."},
{d:"OOO",f:"You bite an apple — sweetness, crunch, red. Why have you failed to access the \"real\" apple according to Harman?",b:"Withdrawal: every object retreats from any relation. Your senses access sensual qualities, but the real apple holds something in reserve. Fire \"accessing\" cotton by burning it also doesn't exhaust what cotton is."},
{d:"OOO",f:"Using a candle flame, distinguish all four categories of Harman's fourfold.",b:"Real object: the flame itself, which withdraws. Sensual object: the flame as experienced. Real qualities: properties regardless of observer (chemical composition). Sensual qualities: properties that shift with observer (warmth at different distances)."},
{d:"OOO",f:"Using a hammer, explain ready-to-hand and present-at-hand, and Harman's radical conclusion.",b:"Ready-to-hand: hammer disappears when used skillfully. Present-at-hand: when it breaks, it becomes visible. Harman generalises beyond humans: ALL relations between ANY objects involve this withdrawal. It's the structure of reality itself."},
{d:"OOO",f:"\"A table is just atoms\" vs \"a table is just a social construct.\" Name and explain both errors.",b:"Undermining: reducing downward to components. Overmining: reducing upward to effects/social meaning. Both deny the table its own reality. OOO says it can't be fully explained by either parts or context."},
{d:"OOO",f:"Using climate change, explain hyperobjects (Morton) and how they extend OOO.",b:"Massively distributed in time and space. Climate change: viscous, nonlocal, temporally undulating, phased. Extends OOO: some objects structurally overwhelm our capacity to grasp them."},
{d:"OOO",f:"What unites speculative realists, and how does OOO differ from Meillassoux?",b:"Shared: rejecting correlationism. Meillassoux: reach the absolute through mathematics. Harman: no relation (including maths) fully captures an object. Objects always withdraw."},
{d:"OOO",f:"Duchamp's urinal as art. How does OOO differ from formalist and constructivist analyses?",b:"Formalist undermines: reduces to material. Constructivist overmines: art because institution says so. OOO: the urinal-as-art is a genuine new object not reducible to either."},
{d:"Art & Objects",f:"Harman locates beauty in which tension of his fourfold, and why not the other three?",b:"RO-SQ — real object disappearing behind sensual qualities. SO-SQ is literal. SO-RQ is present but withdrawn. RO-RQ doubly inaccessible. Only RO-SQ creates aesthetic tension."},
{d:"Art & Objects",f:"\"The literal can never be aesthetic.\" Explain with examples.",b:"Literal reduces to SO-SQ quality-bundles. \"Cornet is like trumpet\" — fully accessible. Aesthetic creates RO-SQ: qualities assigned to what can't support them, real object withdraws."},
{d:"Art & Objects",f:"Fried attacked minimalism as \"theatrical.\" How does Harman reverse this?",b:"\"All aesthetics is theatrical.\" Theatricality saves from the literal. Beholder (RO) fuses with sensual qualities. Beholder is ingredient, not spectator — \"no less than paint or marble.\""},
{d:"Art & Objects",f:"\"What would art without humans be like?\" Why nonsensical for Harman?",b:"Like \"water without hydrogen.\" Human is necessary ingredient. Beholder-RO fuses with sensual qualities to create RO-SQ hybrid. Remove beholder = different entity entirely."},
{d:"Art & Objects",f:"How does metaphor create a new object, and why can't it be paraphrased?",b:"Creates rare RO-SQ: qualities half-plausibly assigned, real object withdraws. Paraphrase converts to literal SO-SQ. Metaphor requires beholder to stand in for missing object."},
{d:"Art & Objects",f:"Kant: beauty is universal, subjective, no science. How does RO-SQ explain all three?",b:"Universal: involves something real (RO). Subjective: RO withdraws, no concept defines it. No science: resists propositional capture. RO-SQ maps directly."},
{d:"Art & Objects",f:"Using undermining/overmining, why do Greenberg (flatness) and social critics (context) both fail?",b:"Greenberg undermines to material medium. Critics overmine to contextual relations. Both deny autonomous withdrawn reality. \"Context stinks\" (Felski)."},
{d:"Art & Objects",f:"How does Latour's modernity critique connect to Harman's critique of Kant/Greenberg/Fried?",b:"All insist subject/object must not mix — Latour's \"central prejudice of modernity.\" Harman: beholder is ingredient fused with artwork — hybrid object. Aesthetic experience is where purification fails."},
{d:"Art & Objects",f:"What is \"academicization\" and how does it connect to RO-SQ?",b:"Taking medium too much for granted. Produces blurring. Medium stops being tension site. Real object stops withdrawing productively — everything becomes literal. Counter (McLuhan): transform clichés into archetypes."},
{d:"Art & Objects",f:"Harman rejects Greenberg's flat plane and Fried's syntactic dissolution. What instead?",b:"Each element has its own medium — own withdrawn self, signalled imperfectly by surface properties. Every figure is its own object with its own background."},
{d:"Art & Objects",f:"Art is \"cognitive without being knowledge.\" Unpack via RO-SQ.",b:"Cognitive: engages something real (RO). Not knowledge: RO withdraws, can't convert to propositions. Knowledge requires literal (SO-SQ); art lives in diagonal (RO-SQ). Philosophy shares this."},
{d:"Art & Objects",f:"Art as \"airy space we can never know\" vs Robert's \"people are doing it.\" How would Harman reconcile?",b:"Grounding in practitioners = overmining. Pure mysticism = undermining. Reality is in RO-SQ tension: genuinely real but withdraws. People keep doing it because the withdrawn real object keeps calling."},
];

/* ═══ STORAGE ═══ */
function ld(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb}catch{return fb}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.error(e)}}
function loadSettings(){return ld("sr-settings",{newPerDay:10,generationMode:false,breakReminder:true,reverseChance:20,pretestMode:true})}

function loadCardsWithSeeds(){
  const ex=ld("sr-cards",[]);const seeded=ld("sr-seeded-v4",false);
  if(seeded)return ex.map(c=>({againCount:0,...c,learningStep:c.learningStep??(c.repetitions===0?0:null)}));
  const now=Date.now();
  const seeds=SEEDS.map((s,i)=>({id:"s"+(i+1).toString().padStart(3,"0"),front:s.f,back:s.b,deck:s.d,interval:0,easeFactor:2.5,repetitions:0,againCount:0,learningStep:0,nextReview:now,lastReviewed:null,created:now-(SEEDS.length-i)*1000}));
  const ids=new Set(ex.map(c=>c.id));
  const merged=[...ex.map(c=>({againCount:0,...c,learningStep:c.learningStep??(c.repetitions===0?0:null)})),...seeds.filter(s=>!ids.has(s.id))];
  sv("sr-cards",merged);sv("sr-seeded-v4",true);return merged;
}

/* ═══ ALGORITHM ═══ */
const LSTEPS=[600000,3600000];

function getNextReview(card,grade,responseTime){
  let{interval,easeFactor,repetitions,againCount,learningStep}=card;
  againCount=againCount||0;learningStep=learningStep??null;
  const isL=learningStep!==null&&learningStep<LSTEPS.length;

  if(grade===0){
    againCount++;
    if(isL||repetitions===0){return{interval:0,easeFactor,repetitions:0,againCount,learningStep:0,nextReview:Date.now()+60000,lastReviewed:Date.now()};}
    repetitions=0;interval=1;easeFactor=Math.max(1.3,easeFactor-0.2);
    return{interval,easeFactor,repetitions,againCount,learningStep:null,nextReview:Date.now()+interval*86400000,lastReviewed:Date.now()};
  }

  if(isL||repetitions===0){
    const step=learningStep||0;
    if(step<LSTEPS.length)return{interval:0,easeFactor,repetitions:0,againCount,learningStep:step+1,nextReview:Date.now()+LSTEPS[step],lastReviewed:Date.now()};
    return{interval:1,easeFactor,repetitions:1,againCount,learningStep:null,nextReview:Date.now()+86400000,lastReviewed:Date.now()};
  }

  repetitions++;
  if(repetitions===1)interval=1;
  else if(repetitions===2)interval=3;
  else interval=Math.round(interval*easeFactor);
  easeFactor=Math.max(1.3,easeFactor+0.1);

  // Response time modulation: fast (<5s) = stretch interval, slow (>20s) = shrink
  if(responseTime&&repetitions>1){
    if(responseTime<5000)interval=Math.round(interval*1.2);
    else if(responseTime>20000)interval=Math.round(interval*0.85);
  }

  return{interval,easeFactor,repetitions,againCount,learningStep:null,nextReview:Date.now()+interval*86400000,lastReviewed:Date.now()};
}

function createCard(f,b,d="General"){return{id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),front:f,back:b,deck:d,interval:0,easeFactor:2.5,repetitions:0,againCount:0,learningStep:0,nextReview:Date.now(),lastReviewed:null,created:Date.now()}}
function isLeech(c){return(c.againCount||0)>=4}

function buildQueue(cards,settings){
  const now=Date.now(),today=new Date().toDateString();
  const learning=cards.filter(c=>c.learningStep!==null&&c.learningStep<LSTEPS.length&&c.learningStep>0&&c.nextReview<=now);
  const review=cards.filter(c=>(c.learningStep===null||c.learningStep>=LSTEPS.length)&&c.repetitions>0&&c.nextReview<=now);
  const allNew=cards.filter(c=>c.repetitions===0&&(c.learningStep===null||c.learningStep===0)&&c.nextReview<=now);
  const newStarted=cards.filter(c=>c.lastReviewed&&new Date(c.lastReviewed).toDateString()===today&&((c.learningStep!==null&&c.learningStep>0&&c.repetitions===0)||(c.repetitions===1&&c.interval===1))).length;
  const newCards=allNew.slice(0,Math.max(0,(settings.newPerDay||10)-newStarted));
  const pool=[...review,...newCards];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
  return[...learning,...pool];
}

function getStats(cards){
  const now=Date.now(),today=new Date().toDateString();
  return{total:cards.length,due:cards.filter(c=>c.nextReview<=now).length,mature:cards.filter(c=>c.interval>=21).length,learning:cards.filter(c=>(c.interval>0&&c.interval<21)||(c.learningStep!==null&&c.learningStep>0)).length,new:cards.filter(c=>c.repetitions===0&&(c.learningStep===null||c.learningStep===0)).length,reviewedToday:cards.filter(c=>c.lastReviewed&&new Date(c.lastReviewed).toDateString()===today).length,leeches:cards.filter(c=>isLeech(c)).length};
}
function dateKey(d){return new Date(d).toISOString().slice(0,10)}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);d.setHours(0,0,0,0);return d}
function fmtTime(ms){const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);return`${m}:${s.toString().padStart(2,"0")}`}

/* ═══ HEADER ═══ */
function Header({view,setView,stats}){
  return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px",borderBottom:"1px solid var(--border)",background:"var(--surface)",position:"sticky",top:0,zIndex:10,flexWrap:"wrap",gap:10}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:34,height:34,borderRadius:9,background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,color:"#fff",fontFamily:S}}>S</div><span style={{fontFamily:S,fontSize:19,fontWeight:700,color:"var(--text)",letterSpacing:"-0.02em"}}>Spaced</span></div>
    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
      {[{k:"home",l:"Dashboard"},{k:"review",l:`Review${stats.due>0?` (${stats.due})`:""}`},{k:"add",l:"+ Add"},{k:"metrics",l:"Metrics"},{k:"browse",l:"Browse"},{k:"settings",l:"Settings"}].map(t=>
        <button key={t.k} onClick={()=>setView(t.k)} style={{padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:13,fontWeight:view===t.k?600:400,fontFamily:F,background:view===t.k?"var(--accent)":"transparent",color:view===t.k?"#fff":"var(--text-muted)"}}>{t.l}</button>
      )}
    </div>
  </div>);
}

function StatCard({label,value,accent,warn}){
  return(<div style={{flex:1,minWidth:100,padding:"16px 18px",borderRadius:13,background:accent?"var(--accent)":warn?"var(--leech)":"var(--card)",border:accent||warn?"none":"1px solid var(--border)"}}>
    <div style={{fontSize:26,fontWeight:700,color:accent||warn?"#fff":"var(--text)",fontFamily:S,lineHeight:1.1}}>{value}</div>
    <div style={{fontSize:11,color:accent||warn?"rgba(255,255,255,0.75)":"var(--text-muted)",marginTop:4,fontFamily:F,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
  </div>);
}

/* ═══ EXPORT/IMPORT ═══ */
function ExportImport({cards,history,onImport}){
  const ref=useRef(null);const[msg,setMsg]=useState("");
  const exp=()=>{const b=new Blob([JSON.stringify({cards,history,version:4},null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="spaced-"+dateKey(Date.now())+".json";a.click();URL.revokeObjectURL(u);setMsg("Exported!");setTimeout(()=>setMsg(""),2000)};
  const imp=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const raw=JSON.parse(ev.target.result);onImport(Array.isArray(raw)?raw:(raw.cards||[]),Array.isArray(raw)?[]:(raw.history||[]));setMsg("Done!");setTimeout(()=>setMsg(""),2000)}catch{setMsg("Error")}};r.readAsText(f);e.target.value=""};
  const btn={padding:"6px 14px",borderRadius:8,border:"1px solid var(--border)",background:"var(--card)",color:"var(--text)",fontSize:12,cursor:"pointer",fontFamily:F,fontWeight:500};
  return(<div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}><button onClick={exp} style={btn}>Export</button><button onClick={()=>ref.current?.click()} style={btn}>Import</button><input ref={ref} type="file" accept=".json" onChange={imp} style={{display:"none"}} />{msg&&<span style={{fontSize:12,color:"var(--accent)",fontWeight:600}}>{msg}</span>}</div>);
}

/* ═══ DASHBOARD ═══ */
function Dashboard({stats,streak,onStart,cards,history,onImport}){
  return(<div style={{padding:24,maxWidth:620,margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:20}}>
      <div><h2 style={{fontFamily:S,fontSize:26,fontWeight:700,color:"var(--text)",margin:"0 0 4px"}}>Today</h2><p style={{color:"var(--text-muted)",fontSize:13,margin:0,fontFamily:F}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p></div>
      <ExportImport cards={cards} history={history} onImport={onImport} />
    </div>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
      <StatCard label="Due" value={stats.due} accent /><StatCard label="Reviewed" value={stats.reviewedToday} /><StatCard label="Streak" value={streak.current} />
    </div>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:28}}>
      <StatCard label="Total" value={stats.total} /><StatCard label="Mature" value={stats.mature} /><StatCard label="Learning" value={stats.learning} /><StatCard label="New" value={stats.new} />{stats.leeches>0&&<StatCard label="Leeches" value={stats.leeches} warn />}
    </div>
    {stats.due>0?<button onClick={onStart} style={{width:"100%",padding:"15px 0",borderRadius:13,border:"none",background:"var(--accent)",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:F,boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>Start Review — {stats.due} due</button>
    :<div style={{textAlign:"center",padding:"36px 20px",borderRadius:13,background:"var(--card)",border:"1px solid var(--border)"}}><div style={{fontSize:34,marginBottom:8}}>✓</div><div style={{fontFamily:S,fontSize:17,color:"var(--text)"}}>All caught up!</div></div>}
    {streak.best>0&&<div style={{marginTop:12,padding:"10px 18px",borderRadius:13,background:"var(--card)",border:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"var(--text-muted)",fontFamily:F}}>Best streak</span><span style={{fontFamily:S,fontSize:17,color:"var(--text)",fontWeight:700}}>{streak.best} days</span></div>}
  </div>);
}

/* ═══ REVIEW — with confidence, generation, session timer, response time ═══ */
function ReviewView({cards,onGrade,onFinish,settings}){
  const[queue,setQueue]=useState(()=>buildQueue(cards,settings));
  const[phase,setPhase]=useState("question"); // question → confidence → (generate) → answer → grade
  const[confidence,setConfidence]=useState(null);
  const[typed,setTyped]=useState("");
  const[cardShown,setCardShown]=useState(Date.now());
  const[capturedRT,setCapturedRT]=useState(null);
  const[sessionStart]=useState(Date.now());
  const[elapsed,setElapsed]=useState(0);
  const[showBreak,setShowBreak]=useState(false);
  const[reversed,setReversed]=useState(false);
  const inputRef=useRef(null);

  // Determine if card should be reversed when queue changes
  useEffect(()=>{if(queue.length>0){const chance=settings.reverseChance||0;const isNew=queue[0].repetitions===0;setReversed(!isNew&&chance>0&&Math.random()*100<chance)}},[queue.length>0&&queue[0]?.id]);

  useEffect(()=>{const t=setInterval(()=>{const e=Date.now()-sessionStart;setElapsed(e);if(settings.breakReminder&&e>1500000&&!showBreak)setShowBreak(true)},1000);return()=>clearInterval(t)},[sessionStart,settings.breakReminder,showBreak]);
  useEffect(()=>{setQueue(buildQueue(cards,settings))},[cards,settings]);

  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT")return;
      if(phase==="question"&&(e.code==="Space"||e.code==="Enter")){e.preventDefault();setCapturedRT(Date.now()-cardShown);setPhase("confidence")}
      else if(phase==="answer"){if(e.key==="1"){e.preventDefault();doGrade(0)}else if(e.key==="2"){e.preventDefault();doGrade(1)}}
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  });

  const doGrade=(grade)=>{
    const rt=capturedRT||Date.now()-cardShown;
    if(queue.length>0)onGrade(queue[0].id,grade,rt,confidence,reversed);
    setQueue(p=>p.slice(1));setPhase("question");setConfidence(null);setTyped("");setCardShown(Date.now());setReversed(false);setCapturedRT(null);
  };

  const handleConfidence=(c)=>{
    setConfidence(c);
    if(settings.generationMode)setPhase("generate");
    else{setPhase("answer")}
  };

  if(queue.length===0)return(<div style={{padding:24,maxWidth:520,margin:"50px auto",textAlign:"center"}}>
    <div style={{fontSize:44,marginBottom:10}}>🎉</div>
    <h2 style={{fontFamily:S,fontSize:22,color:"var(--text)",marginBottom:6}}>Session complete!</h2>
    <p style={{fontSize:13,color:"var(--text-muted)",marginBottom:6,fontFamily:F}}>No more cards due right now.</p>
    <button onClick={onFinish} style={{padding:"10px 28px",borderRadius:9,border:"none",background:"var(--accent)",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:F,marginTop:12}}>Back to Dashboard</button>
  </div>);

  const card=queue[0];const leech=isLeech(card);
  const inL=card.learningStep!==null&&card.learningStep<LSTEPS.length;
  const nextInt=()=>{if(inL||card.repetitions===0){const st=card.learningStep||0;if(st<LSTEPS.length){const m=Math.round(LSTEPS[st]/60000);return m>=60?`${Math.round(m/60)}hr`:`${m}min`}return"1 day"}if(card.repetitions===1)return"3 days";return`${Math.round(card.interval*card.easeFactor)} days`};

  return(<div style={{padding:24,maxWidth:520,margin:"0 auto"}}>
    {/* Session timer & break reminder */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <span style={{fontSize:13,color:"var(--text-muted)",fontFamily:F}}>{queue.length} remaining</span>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {reversed&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:"#7b2cbf22",color:"#7b2cbf",fontFamily:F,fontWeight:600}}>Reversed</span>}
        {inL&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:"var(--accent-light)",color:"var(--accent)",fontFamily:F,fontWeight:600}}>Learning</span>}
        {leech&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:"var(--leech)",color:"#fff",fontFamily:F,fontWeight:600}}>Leech</span>}
        <span style={{fontSize:11,padding:"3px 9px",borderRadius:5,background:"var(--card)",border:"1px solid var(--border)",color:"var(--text-muted)",fontFamily:F}}>{card.deck}</span>
      </div>
    </div>

    {showBreak&&<div style={{padding:"10px 14px",borderRadius:10,background:"var(--accent-light)",border:"1px solid var(--accent)",marginBottom:12,fontSize:12,color:"var(--accent)",fontFamily:F,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span>You've been reviewing for 25+ minutes. Consider a break — research shows diminishing returns from fatigue.</span>
      <button onClick={()=>setShowBreak(false)} style={{padding:"4px 10px",borderRadius:6,border:"none",background:"var(--accent)",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:F,flexShrink:0,marginLeft:8}}>OK</button>
    </div>}

    {leech&&phase==="question"&&<div style={{padding:"10px 14px",borderRadius:10,background:"rgba(231,111,81,0.1)",border:"1px solid var(--leech)",marginBottom:12,fontSize:12,color:"var(--leech)",fontFamily:F}}>Missed {card.againCount} times. Consider rewriting this card.</div>}

    {/* Card */}
    <div onClick={()=>{if(phase==="question"){setCapturedRT(Date.now()-cardShown);setPhase("confidence")}}} style={{
      minHeight:220,padding:"36px 28px",borderRadius:16,background:"var(--card)",border:leech?"2px solid var(--leech)":"1px solid var(--border)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      cursor:phase==="question"?"pointer":"default",position:"relative",
      boxShadow:phase==="answer"?"0 6px 24px rgba(0,0,0,0.06)":"none",
    }}>
      <div style={{position:"absolute",top:14,left:18,fontSize:10,color:"var(--text-muted)",fontFamily:F,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>{phase==="answer"?(reversed?"Question":"Answer"):phase==="generate"?"Your answer first":(reversed?"Can you identify this?":"Question")}</div>
      <div style={{fontFamily:S,fontSize:18,color:"var(--text)",textAlign:"center",lineHeight:1.5,whiteSpace:"pre-wrap"}}>
        {phase==="answer"?(reversed?card.front:card.back):(reversed?card.back:card.front)}
      </div>
      {phase==="question"&&<div style={{marginTop:20,fontSize:12,color:"var(--text-muted)",fontFamily:F}}>Tap to continue</div>}
    </div>

    {/* Confidence step */}
    {phase==="confidence"&&(<div style={{marginTop:16}}>
      <div style={{fontSize:12,color:"var(--text-muted)",fontFamily:F,marginBottom:8,textAlign:"center"}}>Before seeing the answer — how confident are you?</div>
      <div style={{display:"flex",gap:8}}>
        {[{k:"unsure",l:"Unsure",c:"var(--conf-low)"},{k:"maybe",l:"Think so",c:"var(--conf-mid)"},{k:"certain",l:"Certain",c:"var(--conf-high)"}].map(o=>
          <button key={o.k} onClick={()=>handleConfidence(o.k)} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:o.c,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:F}}>{o.l}</button>
        )}
      </div>
    </div>)}

    {/* Generation step */}
    {phase==="generate"&&(<div style={{marginTop:16}}>
      <div style={{fontSize:12,color:"var(--text-muted)",fontFamily:F,marginBottom:8}}>Type your answer before revealing:</div>
      <textarea ref={inputRef} value={typed} onChange={e=>setTyped(e.target.value)} rows={3} style={{width:"100%",padding:"12px 14px",borderRadius:10,fontSize:14,border:"1px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontFamily:F,resize:"vertical",outline:"none"}} autoFocus placeholder="Write what you remember…" />
      <button onClick={()=>setPhase("answer")} style={{marginTop:8,width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:"var(--accent)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:F}}>Reveal Answer</button>
    </div>)}

    {/* Grade step */}
    {phase==="answer"&&(<div>
      {typed&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:10,background:"var(--surface)",border:"1px solid var(--border)",fontSize:12,color:"var(--text-muted)",fontFamily:F}}><strong style={{color:"var(--text)"}}>You wrote:</strong> {typed}</div>}
      <div style={{display:"flex",gap:10,marginTop:12}}>
        <button onClick={()=>doGrade(0)} style={{flex:1,padding:"13px 0",borderRadius:11,border:"none",background:"var(--again)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:F}}>Again<div style={{fontSize:10,fontWeight:400,opacity:0.8,marginTop:2}}>{inL||card.repetitions===0?"1 min":"1 day"}</div></button>
        <button onClick={()=>doGrade(1)} style={{flex:1,padding:"13px 0",borderRadius:11,border:"none",background:"var(--good)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:F}}>Good<div style={{fontSize:10,fontWeight:400,opacity:0.8,marginTop:2}}>{nextInt()}</div></button>
      </div>
    </div>)}
  </div>);
}

/* ═══ ADD CARD with templates ═══ */
const TEMPLATES=["Why does ___?","How would you explain ___ to someone who knows ___?","What would change if ___?","Using [principle], predict ___","Compare ___ and ___ — what's the key difference?","If ___ is true, what follows?"];

function AddCardView({onAdd,decks,settings}){
  const[front,setFront]=useState("");const[back,setBack]=useState("");

  const[ptGuess,setPtGuess]=useState("");
  const[ptRevealed,setPtRevealed]=useState(false);

  const add=()=>{if(!front.trim()||!back.trim())return;
    const f=front.trim(),b=back.trim(),d=showNew&&newDeck.trim()?newDeck.trim():deck;
    onAdd(f,b,d);
    if(settings?.pretestMode){setPretest({front:f,back:b});setPtGuess("");setPtRevealed(false)}

    </div>

      <div style={{display:"flex",gap:8,marginTop:10}}>
        <button onClick={()=>setPtRevealed(true)} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"var(--accent)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:F}}>{ptGuess.trim()?"See correct answer":"Skip — show answer"}</button>
      </div>
    </div>):(<div>
      {ptGuess.trim()&&<div style={{padding:"12px 14px",borderRadius:10,background:"var(--surface)",border:"1px solid var(--border)",marginBottom:10,fontSize:13,fontFamily:F}}>
        <strong style={{color:"var(--text)"}}>Your guess:</strong> <span style={{color:"var(--text-muted)"}}>{ptGuess}</span>
      </div>}

        <div style={{...lab,marginBottom:6,display:"block",color:"var(--accent)"}}>Correct answer</div>
        <div style={{fontSize:14,fontFamily:F,color:"var(--text)",lineHeight:1.6}}>{pretest.back}</div>

    </div>)}
  </div>);

  return(<div style={{padding:24,maxWidth:520,margin:"0 auto"}}>
    <h2 style={{fontFamily:S,fontSize:22,color:"var(--text)",margin:"0 0 4px"}}>Add a card</h2>

    <div style={{marginBottom:16}}>
      <div style={{...lab,marginBottom:6,display:"block"}}>Templates</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {TEMPLATES.map((t,i)=><button key={i} onClick={()=>setFront(t)} style={{padding:"5px 10px",borderRadius:6,fontSize:11,cursor:"pointer",border:"1px solid var(--border)",background:"var(--card)",color:"var(--text-muted)",fontFamily:F}}>{t.slice(0,30)}{t.length>30?"…":""}</button>)}

    <textarea ref={ref} value={front} onChange={e=>setFront(e.target.value)} rows={3} style={inp} placeholder='Ask "why" or "how", not just "what"' />
    <div style={{height:14}} />
    <label style={{...lab,display:"block",marginBottom:5}}>Back (answer)</label>
    <textarea value={back} onChange={e=>setBack(e.target.value)} rows={3} style={inp} />

/* ═══ METRICS with calibration ═══ */
function BarChart({data,barColor,height=120}){
  if(!data.length)return<div style={{color:"var(--text-muted)",fontSize:13,fontFamily:F,padding:20,textAlign:"center"}}>No data yet</div>;
  const max=Math.max(...data.map(d=>d.value),1);
  return(<div style={{display:"flex",alignItems:"flex-end",gap:2,height,width:"100%",paddingTop:8}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <div title={`${d.label}: ${d.value}`} style={{width:"100%",maxWidth:16,minWidth:3,height:Math.max(2,(d.value/max)*(height-24)),background:barColor||"var(--accent)",borderRadius:2}} />
      {data.length<=14&&<div style={{fontSize:8,color:"var(--text-muted)",fontFamily:F,whiteSpace:"nowrap"}}>{d.label}</div>}
    </div>)}
  </div>);
}

function Heatmap({history}){
  const wk=20,td=wk*7,ct={};history.forEach(h=>{const k=dateKey(h.ts);ct[k]=(ct[k]||0)+1});
  const today=new Date();today.setHours(0,0,0,0);const dow=today.getDay();
  const st=new Date(today);st.setDate(st.getDate()-(td-1)-dow);const cells=[];
  for(let i=0;i<td+dow;i++){const d=new Date(st);d.setDate(d.getDate()+i);if(d>today)break;const k=dateKey(d);cells.push({date:k,count:ct[k]||0,dow:d.getDay(),week:Math.floor(i/7)})}
  const cl=c=>c===0?"var(--heat0)":c<=5?"var(--heat1)":c<=15?"var(--heat2)":c<=30?"var(--heat3)":"var(--heat4)";
  return(<div style={{overflowX:"auto",paddingBottom:4}}>
    <svg width={(wk+1)*16+30} height={7*16+4} style={{display:"block"}}>
      {["","Mon","","Wed","","Fri",""].map((l,i)=><text key={i} x={0} y={i*16+12} fontSize={9} fill="var(--text-muted)" fontFamily="DM Sans">{l}</text>)}
      {cells.map((c,i)=><rect key={i} x={c.week*16+28} y={c.dow*16} width={13} height={13} rx={2} fill={cl(c.count)}><title>{c.date}: {c.count}</title></rect>)}
    </svg>
    <div style={{display:"flex",gap:6,alignItems:"center",marginTop:6}}><span style={{fontSize:10,color:"var(--text-muted)",fontFamily:F}}>Less</span>{[0,1,2,3,4].map(i=><div key={i} style={{width:10,height:10,borderRadius:2,background:`var(--heat${i})`}} />)}<span style={{fontSize:10,color:"var(--text-muted)",fontFamily:F}}>More</span></div>
  </div>);
}

function MetricsView({cards,history}){
  const[range,setRange]=useState(30);
  const m=useMemo(()=>{
    const now=Date.now(),co=now-range*86400000,fl=history.filter(h=>h.ts>=co),dm={};
    for(let i=0;i<range;i++){const k=dateKey(daysAgo(i));dm[k]={total:0,good:0,again:0}}
    fl.forEach(h=>{const k=dateKey(h.ts);if(dm[k]){dm[k].total++;h.grade===1?dm[k].good++:dm[k].again++}});
    const dd=Object.entries(dm).sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>({label:k.slice(5),value:v.total,...v}));
    const ad=dd.map(d=>({label:d.label,value:d.total>0?Math.round((d.good/d.total)*100):0}));
    const tr=fl.length,tg=fl.filter(h=>h.grade===1).length,oa=tr>0?Math.round((tg/tr)*100):0;
    const actD=Object.values(dm).filter(d=>d.total>0).length,avg=actD>0?Math.round(tr/actD):0;

    // Calibration
    const withConf=fl.filter(h=>h.confidence);
    const cal={unsure:{total:0,correct:0},maybe:{total:0,correct:0},certain:{total:0,correct:0}};
    withConf.forEach(h=>{if(cal[h.confidence]){cal[h.confidence].total++;if(h.grade===1)cal[h.confidence].correct++}});
    const calData=Object.entries(cal).map(([k,v])=>({label:k,total:v.total,pct:v.total>0?Math.round((v.correct/v.total)*100):0}));

    // Avg response time
    const withRT=fl.filter(h=>h.responseTime);
    const avgRT=withRT.length>0?Math.round(withRT.reduce((s,h)=>s+h.responseTime,0)/withRT.length/1000):0;

    const iv={"New":0,"1d":0,"2-7d":0,"8-21d":0,"22-60d":0,"61-180d":0,"180d+":0};
    cards.forEach(c=>{if(c.repetitions===0)iv["New"]++;else if(c.interval<=1)iv["1d"]++;else if(c.interval<=7)iv["2-7d"]++;else if(c.interval<=21)iv["8-21d"]++;else if(c.interval<=60)iv["22-60d"]++;else if(c.interval<=180)iv["61-180d"]++;else iv["180d+"]++});
    const dkm={};cards.forEach(c=>{if(!dkm[c.deck])dkm[c.deck]={total:0,mature:0,learning:0,new:0,due:0};dkm[c.deck].total++;if(c.repetitions===0)dkm[c.deck].new++;else if(c.interval>=21)dkm[c.deck].mature++;else dkm[c.deck].learning++;if(c.nextReview<=now)dkm[c.deck].due++});
    const fc=[];for(let i=0;i<14;i++){const ds=new Date();ds.setHours(0,0,0,0);ds.setDate(ds.getDate()+i);const de=new Date(ds);de.setDate(de.getDate()+1);fc.push({label:i===0?"Today":i===1?"Tmrw":ds.toLocaleDateString("en-GB",{day:"numeric",month:"short"}),value:cards.filter(c=>c.nextReview>=ds.getTime()&&c.nextReview<de.getTime()).length})}
    return{dailyData:dd,accuracyData:ad,overallAccuracy:oa,totalReviews:tr,avgPerDay:avg,activeDays:actD,intervalData:Object.entries(iv).map(([l,v])=>({label:l,value:v})),deckMap:dkm,forecast:fc,calData,avgRT};
  },[cards,history,range]);
  const rb=a=>({padding:"4px 10px",borderRadius:6,fontSize:11,cursor:"pointer",fontFamily:F,fontWeight:500,border:a?"2px solid var(--accent)":"1px solid var(--border)",background:a?"var(--accent-light)":"transparent",color:"var(--text)"});
  return(<div style={{padding:24,maxWidth:660,margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:8}}>
      <h2 style={{fontFamily:S,fontSize:24,color:"var(--text)",margin:0}}>Metrics</h2>
      <div style={{display:"flex",gap:4}}>{[7,30,90,365].map(r=><button key={r} onClick={()=>setRange(r)} style={rb(range===r)}>{r<=30?`${r}d`:r===90?"3m":"1y"}</button>)}</div>
    </div>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
      <StatCard label="Reviews" value={m.totalReviews} /><StatCard label="Accuracy" value={`${m.overallAccuracy}%`} accent={m.overallAccuracy>=80} /><StatCard label="Avg/day" value={m.avgPerDay} /><StatCard label="Avg time" value={m.avgRT?`${m.avgRT}s`:"-"} />
    </div>
    <div style={sec}><h3 style={secT}>Activity</h3><Heatmap history={history} /></div>
    <div style={sec}><h3 style={secT}>Daily Reviews</h3><BarChart data={m.dailyData} barColor="var(--accent)" /></div>
    <div style={sec}><h3 style={secT}>Accuracy Trend</h3><BarChart data={m.accuracyData} barColor="#52796f" height={100} /></div>

    {/* Calibration */}
    {m.calData.some(c=>c.total>0)&&<div style={sec}>
      <h3 style={secT}>Confidence Calibration</h3>
      <p style={{fontSize:12,color:"var(--text-muted)",fontFamily:F,marginBottom:12}}>How often you got cards right at each confidence level. Perfect calibration: Unsure ≈ 33%, Think so ≈ 66%, Certain ≈ 100%.</p>
      <div style={{display:"flex",gap:10}}>
        {m.calData.map((c,i)=>{const colors=["var(--conf-low)","var(--conf-mid)","var(--conf-high)"];return(
          <div key={i} style={{flex:1,padding:"14px 12px",borderRadius:10,background:"var(--surface)",border:"1px solid var(--border)",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,fontFamily:S,color:colors[i]}}>{c.total>0?`${c.pct}%`:"-"}</div>
            <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:F,marginTop:2,textTransform:"capitalize"}}>{c.label}</div>
            <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:F}}>{c.total} reviews</div>
          </div>
        )})}
      </div>
    </div>}

    <div style={sec}><h3 style={secT}>Card Maturity</h3>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{m.intervalData.map((d,i)=>{const p=cards.length>0?Math.round((d.value/cards.length)*100):0;const cl=["var(--text-muted)","var(--again)","#e09f3e","#588157","var(--accent)","#1b4332","#081c15"];return(<div key={i} style={{flex:1,minWidth:60,padding:"10px 6px",borderRadius:8,background:"var(--surface)",border:"1px solid var(--border)",textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,fontFamily:S,color:cl[i]}}>{d.value}</div><div style={{fontSize:9,color:"var(--text-muted)",fontFamily:F,marginTop:2}}>{d.label}</div><div style={{fontSize:9,color:"var(--text-muted)",fontFamily:F}}>{p}%</div></div>)})}</div>
    </div>
    <div style={sec}><h3 style={secT}>Forecast</h3><BarChart data={m.forecast} barColor="#74c69d" height={90} /></div>
    {Object.keys(m.deckMap).length>0&&<div style={sec}><h3 style={secT}>By Deck</h3>
      {Object.entries(m.deckMap).map(([dk,d])=><div key={dk} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:8,background:"var(--surface)",border:"1px solid var(--border)",marginBottom:6}}>
        <div style={{fontWeight:600,fontSize:13,fontFamily:F,color:"var(--text)",minWidth:80}}>{dk}</div>
        <div style={{flex:1,height:8,borderRadius:4,background:"var(--border)",overflow:"hidden",display:"flex"}}>{d.total>0&&<><div style={{width:`${(d.mature/d.total)*100}%`,background:"var(--accent)",height:"100%"}} /><div style={{width:`${(d.learning/d.total)*100}%`,background:"#74c69d",height:"100%"}} /></>}</div>
        <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:F,minWidth:70,textAlign:"right"}}>{d.total} · {d.due} due</div>
      </div>)}
    </div>}
  </div>);
}

/* ═══ BROWSE with per-card trajectory ═══ */
function BrowseView({cards,history,onDelete,onEdit}){
  const[filter,setFilter]=useState("all");const[editId,setEditId]=useState(null);
  const[ef,setEf]=useState("");const[eb,setEb]=useState("");const[search,setSearch]=useState("");
  const[showLeeches,setShowLeeches]=useState(false);const[expandedId,setExpandedId]=useState(null);
  const decks=[...new Set(cards.map(c=>c.deck))];
  const filtered=cards.filter(c=>filter==="all"||c.deck===filter).filter(c=>!showLeeches||isLeech(c)).filter(c=>!search||c.front.toLowerCase().includes(search.toLowerCase())||c.back.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>b.created-a.created);

  const getTrajectory=(cardId)=>history.filter(h=>h.cardId===cardId).sort((a,b)=>a.ts-b.ts);

  return(<div style={{padding:24,maxWidth:620,margin:"0 auto"}}>
    <h2 style={{fontFamily:S,fontSize:22,color:"var(--text)",margin:"0 0 14px"}}>Browse ({filtered.length})</h2>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{width:"100%",padding:"9px 12px",borderRadius:9,fontSize:13,border:"1px solid var(--border)",background:"var(--card)",color:"var(--text)",fontFamily:F,outline:"none",marginBottom:10}} />
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
      <button onClick={()=>{setFilter("all");setShowLeeches(false)}} style={{padding:"4px 10px",borderRadius:5,fontSize:11,cursor:"pointer",border:filter==="all"&&!showLeeches?"2px solid var(--accent)":"1px solid var(--border)",background:filter==="all"&&!showLeeches?"var(--accent-light)":"var(--card)",color:"var(--text)",fontFamily:F,fontWeight:500}}>All</button>
      {decks.map(d=><button key={d} onClick={()=>{setFilter(d);setShowLeeches(false)}} style={{padding:"4px 10px",borderRadius:5,fontSize:11,cursor:"pointer",border:filter===d?"2px solid var(--accent)":"1px solid var(--border)",background:filter===d?"var(--accent-light)":"var(--card)",color:"var(--text)",fontFamily:F,fontWeight:500}}>{d}</button>)}
      {cards.some(c=>isLeech(c))&&<button onClick={()=>{setShowLeeches(!showLeeches);setFilter("all")}} style={{padding:"4px 10px",borderRadius:5,fontSize:11,cursor:"pointer",border:showLeeches?"2px solid var(--leech)":"1px solid var(--leech)",background:showLeeches?"rgba(231,111,81,0.1)":"transparent",color:"var(--leech)",fontFamily:F,fontWeight:500}}>Leeches</button>}
    </div>
    {filtered.length===0&&<div style={{textAlign:"center",padding:36,color:"var(--text-muted)",fontFamily:F,fontSize:13}}>No cards found.</div>}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {filtered.map(card=>{
        const traj=expandedId===card.id?getTrajectory(card.id):[];
        return(<div key={card.id} style={{padding:"14px 16px",borderRadius:12,background:"var(--card)",border:isLeech(card)?"1px solid var(--leech)":"1px solid var(--border)"}}>
          {editId===card.id?(<div>
            <textarea value={ef} onChange={e=>setEf(e.target.value)} rows={2} style={{width:"100%",padding:8,borderRadius:7,fontSize:12,border:"1px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontFamily:F,resize:"vertical",outline:"none",marginBottom:6}} />
            <textarea value={eb} onChange={e=>setEb(e.target.value)} rows={2} style={{width:"100%",padding:8,borderRadius:7,fontSize:12,border:"1px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontFamily:F,resize:"vertical",outline:"none",marginBottom:6}} />
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{if(ef.trim()&&eb.trim()){onEdit(card.id,ef.trim(),eb.trim());setEditId(null)}}} style={{padding:"5px 14px",borderRadius:5,border:"none",background:"var(--accent)",color:"#fff",fontSize:11,cursor:"pointer",fontFamily:F}}>Save</button>
              <button onClick={()=>setEditId(null)} style={{padding:"5px 14px",borderRadius:5,border:"1px solid var(--border)",background:"transparent",color:"var(--text-muted)",fontSize:11,cursor:"pointer",fontFamily:F}}>Cancel</button>
            </div>
          </div>):(<>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
              <div style={{fontSize:13,color:"var(--text)",fontWeight:600,fontFamily:F,flex:1,whiteSpace:"pre-wrap"}}>{card.front}</div>
              {isLeech(card)&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:"var(--leech)",color:"#fff",fontFamily:F,fontWeight:600}}>LEECH</span>}
            </div>
            <div style={{fontSize:12,color:"var(--text-muted)",fontFamily:F,marginBottom:6,whiteSpace:"pre-wrap"}}>{card.back}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:F}}>{card.deck} · {card.interval}d · reps:{card.repetitions}{card.againCount>0?` · ✗${card.againCount}`:""}</div>
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>setExpandedId(expandedId===card.id?null:card.id)} style={{padding:"3px 8px",borderRadius:5,border:"1px solid var(--border)",background:expandedId===card.id?"var(--accent-light)":"transparent",color:"var(--text-muted)",fontSize:10,cursor:"pointer",fontFamily:F}}>History</button>
                <button onClick={()=>{setEditId(card.id);setEf(card.front);setEb(card.back)}} style={{padding:"3px 8px",borderRadius:5,border:"1px solid var(--border)",background:"transparent",color:"var(--text-muted)",fontSize:10,cursor:"pointer",fontFamily:F}}>Edit</button>
                <button onClick={()=>onDelete(card.id)} style={{padding:"3px 8px",borderRadius:5,border:"1px solid var(--again)",background:"transparent",color:"var(--again)",fontSize:10,cursor:"pointer",fontFamily:F}}>Delete</button>
              </div>
            </div>
            {/* Per-card trajectory */}
            {expandedId===card.id&&<div style={{marginTop:10,padding:"10px 12px",borderRadius:8,background:"var(--surface)",border:"1px solid var(--border)"}}>
              {traj.length===0?<div style={{fontSize:11,color:"var(--text-muted)",fontFamily:F}}>No review history yet.</div>
              :<div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"flex-end"}}>
                {traj.map((h,i)=>{
                  const isGood=h.grade===1;
                  const rt=h.responseTime?`${Math.round(h.responseTime/1000)}s`:"";
                  const conf=h.confidence?h.confidence[0].toUpperCase():"";
                  return(<div key={i} title={`${new Date(h.ts).toLocaleDateString()} ${isGood?"Good":"Again"} ${rt} ${h.confidence||""}`} style={{
                    width:14,height:isGood?Math.min(40,14+i*2):14,
                    borderRadius:2,background:isGood?"var(--good)":"var(--again)",
                    position:"relative",
                  }}>
                    {conf&&<div style={{position:"absolute",top:-12,left:0,fontSize:7,color:"var(--text-muted)",fontFamily:F,width:14,textAlign:"center"}}>{conf}</div>}
                  </div>);
                })}
              </div>}
              {traj.length>0&&<div style={{fontSize:10,color:"var(--text-muted)",fontFamily:F,marginTop:6}}>
                {traj.length} reviews · {traj.filter(h=>h.grade===1).length} good · {traj.filter(h=>h.grade===0).length} again
                {traj.some(h=>h.responseTime)&&` · avg ${Math.round(traj.filter(h=>h.responseTime).reduce((s,h)=>s+h.responseTime,0)/traj.filter(h=>h.responseTime).length/1000)}s`}
              </div>}
            </div>}
          </>)}
        </div>);
      })}
    </div>
  </div>);
}

/* ═══ MAIN APP ═══ */
function App(){
  const[cards,setCards]=useState(()=>loadCardsWithSeeds());
  const[history,setHistory]=useState(()=>ld("sr-history",[]));
  const[view,setView]=useState("home");
  const[streak,setStreak]=useState(()=>ld("sr-streak",{current:0,lastDate:null,best:0}));
  const[settings,setSettings]=useState(()=>loadSettings());

  const updateStreak=useCallback(()=>{
    const today=new Date().toDateString();
    setStreak(p=>{if(p.lastDate===today)return p;const y=new Date(Date.now()-86400000).toDateString();const nc=p.lastDate===y?p.current+1:1;const ns={current:nc,lastDate:today,best:Math.max(p.best,nc)};sv("sr-streak",ns);return ns});
  },[]);

  const handleGrade=useCallback((id,grade,responseTime,confidence,reversed)=>{
    const card=cards.find(c=>c.id===id);
    setHistory(p=>{const u=[...p,{ts:Date.now(),cardId:id,grade,deck:card?.deck||"General",responseTime,confidence,reversed:!!reversed}];sv("sr-history",u);return u});
    setCards(p=>{const u=p.map(c=>c.id!==id?c:{...c,...getNextReview(c,grade,responseTime)});sv("sr-cards",u);return u});
    updateStreak();
  },[cards,updateStreak]);

  const handleAdd=useCallback((f,b,d)=>{setCards(p=>{const u=[...p,createCard(f,b,d)];sv("sr-cards",u);return u})},[]);
  const handleDelete=useCallback(id=>{setCards(p=>{const u=p.filter(c=>c.id!==id);sv("sr-cards",u);return u})},[]);
  const handleEdit=useCallback((id,f,b)=>{setCards(p=>{const u=p.map(c=>c.id===id?{...c,front:f,back:b,againCount:0}:c);sv("sr-cards",u);return u})},[]);
  const handleImport=useCallback((ic,ih)=>{
    setCards(p=>{const ids=new Set(p.map(c=>c.id));const u=[...p,...ic.filter(c=>!ids.has(c.id)).map(c=>({againCount:0,...c,learningStep:c.learningStep??(c.repetitions===0?0:null)}))];sv("sr-cards",u);return u});
    if(ih?.length>0)setHistory(p=>{const u=[...p,...ih];sv("sr-history",u);return u});
  },[]);
  const handleSettings=useCallback(s=>{setSettings(s);sv("sr-settings",s)},[]);

  const stats=getStats(cards);
  const decks=[...new Set(cards.map(c=>c.deck))];if(!decks.length)decks.push("General");

  return(<div>
    <Header view={view} setView={setView} stats={stats} />
    {view==="home"&&<Dashboard stats={stats} streak={streak} onStart={()=>setView("review")} cards={cards} history={history} onImport={handleImport} />}
    {view==="review"&&<ReviewView cards={cards} onGrade={handleGrade} onFinish={()=>setView("home")} settings={settings} />}
    {view==="add"&&<AddCardView onAdd={handleAdd} decks={decks} settings={settings} />}
    {view==="metrics"&&<MetricsView cards={cards} history={history} />}
    {view==="browse"&&<BrowseView cards={cards} history={history} onDelete={handleDelete} onEdit={handleEdit} />}
    {view==="settings"&&<SettingsView settings={settings} onSave={handleSettings} cards={cards} />}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}</script>
</body>
